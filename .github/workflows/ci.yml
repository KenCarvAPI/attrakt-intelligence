name: CI

# Runs on every push and pull request.
on:
  push:
  pull_request:

jobs:
  # Type-checking and the production admin build. We type-check core + admin (clean
  # tsconfigs). The api/agents/mcp-servers packages can't be type-checked in
  # isolation yet because the root tsconfig `paths` resolve workspace deps to
  # source (so each consumer pulls another package's src and trips `rootDir`);
  # fixing that needs a project-references refactor (tracked, see DEPLOYMENT.md).
  # Lint is advisory until the shared eslint plugin/ruleset is added.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Build core first so downstream packages resolve to its declarations.
      - run: pnpm --filter @attrakt/core exec prisma generate
      - run: pnpm --filter @attrakt/core build

      - name: Type-check (core)
        run: pnpm --filter @attrakt/core type-check
      - name: Type-check (admin)
        run: pnpm --filter @attrakt/admin type-check

      - name: Lint (advisory)
        run: pnpm lint
        continue-on-error: true

      - name: Build admin (production)
        run: pnpm --filter @attrakt/admin build
        env:
          NODE_ENV: production

  # Unit tests, multi-tenancy integration tests, and the critical-path smoke test,
  # against real Postgres + Redis services.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: attrakt
          POSTGRES_PASSWORD: attrakt
          POSTGRES_DB: attrakt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U attrakt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://attrakt:attrakt@localhost:5432/attrakt
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm --filter @attrakt/core exec prisma generate
          pnpm --filter @attrakt/core exec prisma migrate deploy
      # Build core so the agents smoke test resolves @attrakt/core declarations.
      - run: pnpm --filter @attrakt/core build

      - name: Unit + multi-tenancy integration tests
        run: pnpm --filter @attrakt/core test

      - name: Critical-path smoke test
        run: pnpm --filter @attrakt/agents test
