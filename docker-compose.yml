services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: attrakt-postgres
    environment:
      POSTGRES_USER: attrakt
      POSTGRES_PASSWORD: attrakt_dev
      POSTGRES_DB: attrakt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Enables the TimescaleDB extension on first DB init.
      - ./packages/core/prisma/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attrakt -d attrakt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attrakt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
